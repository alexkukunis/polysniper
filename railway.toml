# Railway Configuration
# Service detection via RAILWAY_SERVICE_NAME (auto-set by Railway)
#   - worker service → @repo/worker (no HTTP healthcheck)
#   - web service → @repo/web (healthcheck on /)

[build]
builder = "RAILPACK"

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
